<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid Notepad — Offline AI + Semantic Search</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1a1a1a; --border: #2a2a2a;
    --text: #e0e0e0; --muted: #888; --accent: #3b82f6; --accent2: #8b5cf6;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  .header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); flex-wrap: wrap; }
  .header h1 { font-size: 15px; font-weight: 600; flex-shrink: 0; }
  .model-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .model-badge.loading { background: #1a1a00; color: var(--yellow); }
  .model-badge.ready { background: #0a1a0a; color: var(--green); }
  .model-badge.error { background: #1a0a0a; color: var(--red); }
  .header-stats { margin-left: auto; font-size: 11px; color: var(--muted); }
  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; width: 120px; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

  .app { flex: 1; display: flex; overflow: hidden; }
  .panel { display: flex; flex-direction: column; }
  .panel-left { width: 350px; border-right: 1px solid var(--border); }
  .panel-right { flex: 1; display: flex; flex-direction: column; }

  .search-bar { padding: 10px; border-bottom: 1px solid var(--border); }
  .search-input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-modes { display: flex; gap: 4px; margin-top: 6px; }
  .mode-btn { padding: 3px 8px; font-size: 10px; border: 1px solid var(--border); border-radius: 12px; background: transparent; color: var(--muted); cursor: pointer; }
  .mode-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .note-list { flex: 1; overflow-y: auto; }
  .note-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .note-item:hover { background: var(--surface2); }
  .note-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .note-item .title { font-size: 13px; font-weight: 500; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item .preview { font-size: 11px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .note-item .meta { font-size: 10px; color: var(--muted); margin-top: 3px; display: flex; justify-content: space-between; }
  .note-item .score { font-size: 9px; background: var(--accent); color: white; padding: 1px 5px; border-radius: 8px; }
  .note-item .score.bm25 { background: var(--accent2); }
  .note-item .score.hybrid { background: var(--green); color: #000; }
  .note-item .tags { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
  .note-item .tag { font-size: 9px; background: var(--surface2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 8px; color: var(--muted); }

  .editor-area { flex: 1; display: flex; flex-direction: column; }
  .editor-toolbar { padding: 6px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
  .editor-title { flex: 1; padding: 5px 8px; background: transparent; border: 1px solid transparent; border-radius: 4px; color: var(--text); font-size: 14px; font-weight: 600; }
  .editor-title:focus { outline: none; border-color: var(--border); background: var(--bg); }
  .editor-content { flex: 1; display: flex; }
  .editor-content textarea { flex: 1; padding: 14px 18px; background: transparent; border: none; color: var(--text); font-size: 13px; line-height: 1.6; resize: none; font-family: inherit; }
  .editor-content textarea:focus { outline: none; }
  .editor-footer { padding: 6px 14px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; }

  /* AI Panel */
  .ai-panel { width: 320px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
  .ai-panel.hidden { display: none; }
  .ai-header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .ai-header h3 { font-size: 12px; color: var(--orange); }
  .ai-actions { padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 4px; border-bottom: 1px solid var(--border); }
  .ai-btn { padding: 4px 10px; font-size: 11px; border: 1px solid var(--border); border-radius: 14px; background: transparent; color: var(--text); cursor: pointer; }
  .ai-btn:hover { border-color: var(--orange); color: var(--orange); }
  .ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ai-output { flex: 1; overflow-y: auto; padding: 12px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
  .ai-output .generating { color: var(--orange); }
  .ai-input { padding: 8px; border-top: 1px solid var(--border); }
  .ai-input input { width: 100%; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; }
  .ai-input input:focus { outline: none; border-color: var(--orange); }

  .btn { padding: 5px 10px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; }
  .btn:hover { opacity: 0.9; }
  .btn-sm { padding: 3px 7px; font-size: 10px; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--muted); color: var(--text); }
  .btn-danger { background: var(--red); }
  .btn-ai { background: var(--orange); }
  .empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }

  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .panel-left { width: 100%; max-height: 35vh; border-right: none; border-bottom: 1px solid var(--border); }
    .ai-panel { width: 100%; max-height: 40vh; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Hybrid Notepad</h1>
  <div class="model-badge loading" id="embed-status">Embeddings...</div>
  <div class="progress-bar" id="embed-progress"><div class="progress-fill" id="embed-fill" style="width:0%"></div></div>
  <div class="model-badge loading" id="llm-status">LLM...</div>
  <div class="progress-bar" id="llm-progress"><div class="progress-fill" id="llm-fill" style="width:0%"></div></div>
  <div class="header-stats" id="header-stats">0 notas</div>
</div>

<div class="app">
  <div class="panel panel-left">
    <div class="search-bar">
      <input type="text" class="search-input" id="search-input" placeholder="Buscar notas..." oninput="onSearch()" />
      <div class="search-modes">
        <button class="mode-btn active" data-mode="hybrid" onclick="setMode('hybrid')">Hibrida</button>
        <button class="mode-btn" data-mode="semantic" onclick="setMode('semantic')">Semantica</button>
        <button class="mode-btn" data-mode="text" onclick="setMode('text')">BM25</button>
      </div>
    </div>
    <div style="padding:6px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px">
      <button class="btn btn-sm" onclick="newNote()">+ Nueva</button>
    </div>
    <div class="note-list" id="note-list"><div class="empty">Crea tu primera nota</div></div>
  </div>

  <div class="panel panel-right">
    <div class="editor-area" id="editor-area" style="display:none">
      <div class="editor-toolbar">
        <input type="text" class="editor-title" id="editor-title" placeholder="Titulo..." oninput="onTitleChange()" />
        <button class="btn btn-sm btn-ai" onclick="toggleAI()">AI</button>
        <button class="btn btn-sm btn-outline btn-danger" onclick="deleteNote()">Eliminar</button>
      </div>
      <div style="flex:1;display:flex;overflow:hidden">
        <div class="editor-content"><textarea id="editor-text" placeholder="Escribe aqui..." oninput="onTextChange()"></textarea></div>
        <div class="ai-panel hidden" id="ai-panel">
          <div class="ai-header">
            <h3>Qwen3 0.6B (local)</h3>
            <div style="display:flex;gap:6px;align-items:center">
              <label style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer" title="Thinking mode: el modelo razona paso a paso antes de responder">
                <input type="checkbox" id="ai-thinking" onchange="toggleThinking()" style="accent-color:var(--orange)" />
                <span>Think</span>
              </label>
              <button class="btn btn-sm btn-outline" onclick="toggleAI()">X</button>
            </div>
          </div>
          <div class="ai-actions">
            <button class="ai-btn" onclick="aiAction('summarize')" id="ai-summarize">Resumir</button>
            <button class="ai-btn" onclick="aiAction('tags')" id="ai-tags">Auto-tag</button>
            <button class="ai-btn" onclick="aiAction('questions')" id="ai-questions">Preguntas clave</button>
            <button class="ai-btn" onclick="aiAction('expand')" id="ai-expand">Expandir</button>
            <button class="ai-btn" onclick="aiAction('translate')" id="ai-translate">Traducir EN</button>
          </div>
          <div class="ai-output" id="ai-output"><span style="color:var(--muted)">Selecciona una accion o escribe una pregunta sobre la nota.</span></div>
          <div class="ai-input">
            <input type="text" id="ai-question" placeholder="Pregunta sobre esta nota..." onkeydown="if(event.key==='Enter')aiAsk()" />
          </div>
        </div>
      </div>
      <div class="editor-footer">
        <span id="editor-footer-left"></span>
        <span id="editor-footer-right"></span>
      </div>
    </div>
    <div class="empty" id="editor-empty">Selecciona o crea una nota</div>
  </div>
</div>

<script src="js-vector-store.js"></script>
<script src="js-doc-store.js"></script>

<script type="module">
  import { pipeline, TextStreamer } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';

  let embedder = null, generator = null;
  let db, notes, vecStore, bm25, hybrid;
  let currentNoteId = null, searchMode = 'hybrid', saveTimer = null;
  let aiGenerating = false;
  let thinkingEnabled = false;
  const DIM = 384;

  // ── IndexedDB Adapter ─────────────────────────────────

  class IDBAdapter {
    constructor(dbName = 'hybrid-notepad') { this.dbName = dbName; this._cache = new Map(); this._db = null; }
    async init() {
      this._db = await new Promise((res, rej) => {
        const r = indexedDB.open(this.dbName, 1);
        r.onupgradeneeded = () => r.result.createObjectStore('data');
        r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
      });
      const tx = this._db.transaction('data', 'readonly');
      const st = tx.objectStore('data');
      const keys = await new Promise(r => { const q = st.getAllKeys(); q.onsuccess = () => r(q.result); });
      for (const k of keys) {
        const v = await new Promise(r => { const q = this._db.transaction('data','readonly').objectStore('data').get(k); q.onsuccess = () => r(q.result); });
        this._cache.set(k, v);
      }
    }
    readJson(k) { return this._cache.get('json:'+k) ?? null; }
    writeJson(k,v) { this._cache.set('json:'+k, v); }
    readBin(k) { return this._cache.get('bin:'+k) ?? null; }
    writeBin(k,v) { this._cache.set('bin:'+k, v); }
    delete(k) { this._cache.delete('json:'+k); this._cache.delete('bin:'+k); }
    async persist() {
      const tx = this._db.transaction('data','readwrite');
      const st = tx.objectStore('data');
      for (const [k,v] of this._cache) st.put(v, k);
      await new Promise((r,j) => { tx.oncomplete=r; tx.onerror=j; });
    }
  }

  // ── Init ──────────────────────────────────────────────

  const adapter = new IDBAdapter();

  async function init() {
    await adapter.init();
    db = new DocStore(adapter);
    notes = db.collection('notes');
    vecStore = new PolarQuantizedStore(adapter, DIM);
    bm25 = new BM25Index();
    hybrid = new HybridSearch(vecStore, bm25, 'rrf');
    bm25.load(adapter, 'notes');
    if (bm25.count('notes') === 0) {
      for (const n of notes.find({}).toArray()) bm25.addDocument('notes', n._id, (n.title||'')+' '+(n.content||''));
    }
    renderNoteList(); updateStats();

    // Load models in parallel
    loadEmbedder();
    loadLLM();
  }

  async function loadEmbedder() {
    setStatus('embed', 'loading', 'Embeddings...');
    try {
      embedder = await pipeline('feature-extraction', 'Xenova/multilingual-e5-small', {
        progress_callback: p => {
          if (p.status === 'progress' && p.total) {
            document.getElementById('embed-fill').style.width = Math.round(p.loaded/p.total*100)+'%';
          }
        }
      });
      setStatus('embed', 'ready', 'E5 ready');
      document.getElementById('embed-progress').style.display = 'none';
      await indexMissingNotes();
    } catch (e) { setStatus('embed', 'error', 'E5 error'); console.error(e); }
  }

  async function loadLLM() {
    setStatus('llm', 'loading', 'LLM...');
    try {
      const device = navigator.gpu ? 'webgpu' : 'wasm';
      const dtype = device === 'webgpu' ? 'q4f16' : 'q4';
      generator = await pipeline('text-generation', 'onnx-community/Qwen3-0.6B-ONNX', {
        device, dtype,
        progress_callback: p => {
          if (p.status === 'progress' && p.total) {
            document.getElementById('llm-fill').style.width = Math.round(p.loaded/p.total*100)+'%';
          }
        }
      });
      setStatus('llm', 'ready', `Qwen3 (${device})`);
      document.getElementById('llm-progress').style.display = 'none';
    } catch (e) { setStatus('llm', 'error', 'LLM error'); console.error(e); }
  }

  function setStatus(model, state, text) {
    const el = document.getElementById(model+'-status');
    el.className = 'model-badge ' + state;
    el.textContent = text;
  }

  // ── Embedding ─────────────────────────────────────────

  async function embed(text) {
    if (!embedder) return null;
    const out = await embedder('passage: ' + text, { pooling: 'mean', normalize: true });
    return Array.from(out.data);
  }
  async function embedQuery(text) {
    if (!embedder) return null;
    const out = await embedder('query: ' + text, { pooling: 'mean', normalize: true });
    return Array.from(out.data);
  }
  async function indexMissingNotes() {
    let n = 0;
    for (const note of notes.find({}).toArray()) {
      if (!vecStore.has('notes', note._id) && note.content) {
        const vec = await embed((note.title||'')+' '+note.content);
        if (vec) { vecStore.set('notes', note._id, vec, { title: note.title, preview: note.content.slice(0,100) }); n++; }
      }
    }
    if (n > 0) { vecStore.flush(); await adapter.persist(); updateStats(); }
  }

  // ── LLM (Qwen3 local) ────────────────────────────────

  async function generate(prompt, opts = {}) {
    if (!generator) throw new Error('LLM no cargado');
    const messages = [
      { role: 'system', content: opts.system || 'Eres un asistente util. Responde de forma concisa.' },
      { role: 'user', content: prompt },
    ];
    const output = await generator(messages, {
      max_new_tokens: opts.maxTokens || 256,
      do_sample: false,
      temperature: 0.7,
    });
    return output[0].generated_text.at(-1).content;
  }

  window.toggleThinking = function() {
    thinkingEnabled = document.getElementById('ai-thinking').checked;
  };

  async function generateStream(prompt, outputEl, opts = {}) {
    if (!generator) { outputEl.textContent = 'LLM no cargado. Esperando descarga...'; return; }
    aiGenerating = true;
    outputEl.innerHTML = '<span class="generating">Generando...</span>';

    const systemPrompt = opts.system || 'Eres un asistente util. Responde de forma concisa en el idioma del texto.';
    const messages = [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: thinkingEnabled ? prompt : prompt + '\n/no_think' },
    ];

    let rawText = '';
    let inThinkBlock = false;
    let thinkContent = '';
    let answerContent = '';

    const streamer = new TextStreamer(generator.tokenizer, {
      skip_prompt: true,
      skip_special_tokens: true,
      callback_function: (token) => {
        rawText += token;

        // Parse think blocks
        if (rawText.includes('<think>') && !rawText.includes('</think>')) {
          inThinkBlock = true;
          thinkContent = rawText.split('<think>').pop();
          if (thinkingEnabled) {
            outputEl.innerHTML = '<div style="color:var(--muted);font-style:italic;border-left:2px solid var(--orange);padding-left:8px;margin-bottom:8px">Pensando...\n' + esc(thinkContent) + '</div>';
          } else {
            outputEl.innerHTML = '<span class="generating">Pensando...</span>';
          }
        } else if (rawText.includes('</think>')) {
          inThinkBlock = false;
          const parts = rawText.split('</think>');
          thinkContent = (parts[0] || '').replace('<think>', '').trim();
          answerContent = (parts[1] || '').trim();

          let html = '';
          if (thinkingEnabled && thinkContent) {
            html += '<details style="margin-bottom:8px"><summary style="font-size:11px;color:var(--orange);cursor:pointer">Razonamiento</summary><div style="color:var(--muted);font-style:italic;font-size:11px;padding:6px 0;white-space:pre-wrap">' + esc(thinkContent) + '</div></details>';
          }
          html += esc(answerContent);
          outputEl.innerHTML = html;
        } else if (!rawText.includes('<think>')) {
          // No think block at all
          outputEl.textContent = rawText;
        }
        outputEl.scrollTop = outputEl.scrollHeight;
      },
    });

    try {
      await generator(messages, {
        max_new_tokens: thinkingEnabled ? (opts.maxTokens || 300) + 200 : (opts.maxTokens || 300),
        do_sample: false,
        streamer,
      });
    } catch (e) {
      outputEl.innerHTML += '\n\n<span style="color:var(--red)">[Error: ' + e.message + ']</span>';
    }
    aiGenerating = false;

    // Return clean answer (without think block)
    if (rawText.includes('</think>')) {
      return rawText.split('</think>').pop().trim();
    }
    return rawText.replace(/<think>[\s\S]*<\/think>/g, '').trim();
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ── AI Actions ────────────────────────────────────────

  window.toggleAI = function() {
    document.getElementById('ai-panel').classList.toggle('hidden');
  };

  window.aiAction = async function(action) {
    if (aiGenerating || !currentNoteId) return;
    const note = notes.findById(currentNoteId);
    if (!note || !note.content) return;
    const output = document.getElementById('ai-output');
    const text = (note.title ? note.title + '\n\n' : '') + note.content;

    const prompts = {
      summarize: { system: 'Resume textos de forma concisa, manteniendo los puntos clave.', prompt: `Resume esta nota:\n\n${text}` },
      tags: { system: 'Genera tags/etiquetas relevantes para clasificar textos. Retorna solo las tags separadas por comas, sin explicacion.', prompt: `Genera 3-5 tags para esta nota:\n\n${text}` },
      questions: { system: 'Genera preguntas clave que el texto responde o deberia responder.', prompt: `Que preguntas clave aborda esta nota?\n\n${text}` },
      expand: { system: 'Expande y desarrolla las ideas del texto con mas detalle.', prompt: `Expande esta nota con mas detalle:\n\n${text}`, maxTokens: 500 },
      translate: { system: 'Translate the following text to English. Only output the translation, no explanations.', prompt: text },
    };

    const cfg = prompts[action];
    const result = await generateStream(cfg.prompt, output, { system: cfg.system, maxTokens: cfg.maxTokens || 300 });

    // Auto-save tags if generated
    if (action === 'tags' && result) {
      const tags = result.split(',').map(t => t.trim().toLowerCase()).filter(t => t.length > 1 && t.length < 30);
      if (tags.length > 0) {
        notes.update({ _id: currentNoteId }, { $set: { tags } });
        db.flush(); await adapter.persist();
        renderNoteList();
      }
    }
  };

  window.aiAsk = async function() {
    if (aiGenerating || !currentNoteId) return;
    const input = document.getElementById('ai-question');
    const question = input.value.trim();
    if (!question) return;
    input.value = '';

    const note = notes.findById(currentNoteId);
    if (!note) return;

    const output = document.getElementById('ai-output');
    const text = (note.title ? note.title + '\n\n' : '') + note.content;

    // RAG: buscar notas relacionadas para contexto adicional
    let ragContext = '';
    if (embedder && vecStore.count('notes') > 0) {
      const qVec = await embedQuery(question);
      if (qVec) {
        const related = vecStore.search('notes', qVec, 3).filter(r => r.id !== currentNoteId);
        if (related.length > 0) {
          ragContext = '\n\nNotas relacionadas:\n' + related.map(r => '- ' + (r.metadata.title || '') + ': ' + (r.metadata.preview || '')).join('\n');
        }
      }
    }

    await generateStream(
      `Contexto (nota actual):\n${text}${ragContext}\n\nPregunta: ${question}`,
      output,
      { system: 'Responde preguntas usando el contexto proporcionado. Se preciso y conciso.' }
    );
  };

  // ── Note CRUD ─────────────────────────────────────────

  window.newNote = function() {
    const note = notes.insert({ title: '', content: '', tags: [], createdAt: Date.now(), updatedAt: Date.now() });
    db.flush(); adapter.persist();
    selectNote(note._id); renderNoteList();
    document.getElementById('editor-title').focus();
  };

  window.deleteNote = function() {
    if (!currentNoteId || !confirm('Eliminar?')) return;
    notes.removeById(currentNoteId);
    bm25.removeDocument('notes', currentNoteId);
    vecStore.remove('notes', currentNoteId);
    db.flush(); bm25.save(adapter, 'notes'); vecStore.flush(); adapter.persist();
    currentNoteId = null;
    document.getElementById('editor-area').style.display = 'none';
    document.getElementById('editor-empty').style.display = 'flex';
    renderNoteList(); updateStats();
  };

  function selectNote(id) {
    currentNoteId = id;
    const note = notes.findById(id);
    if (!note) return;
    document.getElementById('editor-title').value = note.title || '';
    document.getElementById('editor-text').value = note.content || '';
    document.getElementById('editor-area').style.display = 'flex';
    document.getElementById('editor-empty').style.display = 'none';
    const words = (note.content || '').split(/\s+/).filter(Boolean).length;
    document.getElementById('editor-footer-left').textContent = new Date(note.updatedAt).toLocaleString();
    document.getElementById('editor-footer-right').textContent = words + ' palabras';
    document.getElementById('ai-output').innerHTML = '<span style="color:var(--muted)">Selecciona una accion o pregunta sobre la nota.</span>';
    renderNoteList();
  }
  window.selectNote = selectNote;

  window.onTitleChange = function() { scheduleSave(); };
  window.onTextChange = function() { scheduleSave(); };

  function scheduleSave() { if (saveTimer) clearTimeout(saveTimer); saveTimer = setTimeout(() => saveCurrentNote(), 600); }

  async function saveCurrentNote() {
    if (!currentNoteId) return;
    const title = document.getElementById('editor-title').value;
    const content = document.getElementById('editor-text').value;
    notes.update({ _id: currentNoteId }, { $set: { title, content, updatedAt: Date.now() } });
    db.flush();
    bm25.removeDocument('notes', currentNoteId);
    bm25.addDocument('notes', currentNoteId, (title||'')+' '+content);
    bm25.save(adapter, 'notes');
    if (embedder && content.length > 0) {
      const vec = await embed((title||'')+' '+content);
      if (vec) { vecStore.set('notes', currentNoteId, vec, { title, preview: content.slice(0,100) }); vecStore.flush(); }
    }
    await adapter.persist();
    const words = content.split(/\s+/).filter(Boolean).length;
    document.getElementById('editor-footer-left').textContent = 'Guardada: ' + new Date().toLocaleTimeString();
    document.getElementById('editor-footer-right').textContent = words + ' palabras';
    renderNoteList(); updateStats();
  }

  // ── Search ────────────────────────────────────────────

  let searchTimer = null;
  window.onSearch = function() { if (searchTimer) clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 200); };

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) { renderNoteList(); return; }
    const results = [];
    if (searchMode === 'text' || !embedder) {
      for (const r of bm25.search('notes', q, 20)) { const n = notes.findById(r.id); if (n) results.push({...n, score: r.score, scoreType: 'bm25'}); }
    } else if (searchMode === 'semantic') {
      const qv = await embedQuery(q);
      if (qv && vecStore.count('notes') > 0) for (const r of vecStore.search('notes', qv, 20)) { const n = notes.findById(r.id); if (n) results.push({...n, score: r.score, scoreType: 'semantic'}); }
    } else {
      if (vecStore.count('notes') > 0 && embedder) {
        const qv = await embedQuery(q);
        if (qv) for (const r of hybrid.search('notes', qv, q, 20)) { const n = notes.findById(r.id); if (n) results.push({...n, score: r.score, scoreType: 'hybrid'}); }
      } else {
        for (const r of bm25.search('notes', q, 20)) { const n = notes.findById(r.id); if (n) results.push({...n, score: r.score, scoreType: 'bm25'}); }
      }
    }
    renderSearchResults(results);
  }

  window.setMode = function(m) {
    searchMode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    if (document.getElementById('search-input').value.trim()) doSearch();
  };

  // ── Render ────────────────────────────────────────────

  function renderNoteList() {
    const list = document.getElementById('note-list');
    const all = notes.find({}).sort({ updatedAt: -1 }).toArray();
    if (all.length === 0) { list.innerHTML = '<div class="empty">Crea tu primera nota</div>'; return; }
    list.innerHTML = all.map(n => `
      <div class="note-item ${n._id===currentNoteId?'active':''}" onclick="selectNote('${n._id}')">
        <div class="title">${esc(n.title||'Sin titulo')}</div>
        <div class="preview">${esc((n.content||'').slice(0,100))}</div>
        ${n.tags&&n.tags.length ? '<div class="tags">'+n.tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>' : ''}
        <div class="meta"><span>${timeAgo(n.updatedAt)}</span></div>
      </div>`).join('');
  }

  function renderSearchResults(results) {
    const list = document.getElementById('note-list');
    if (!results.length) { list.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
    list.innerHTML = results.map(n => `
      <div class="note-item ${n._id===currentNoteId?'active':''}" onclick="selectNote('${n._id}')">
        <div class="title">${esc(n.title||'Sin titulo')} <span class="score ${n.scoreType}">${n.score.toFixed(4)}</span></div>
        <div class="preview">${esc((n.content||'').slice(0,100))}</div>
        <div class="meta"><span>${timeAgo(n.updatedAt)}</span><span>${n.scoreType}</span></div>
      </div>`).join('');
  }

  function updateStats() {
    const c = notes.count(), v = vecStore.count('notes');
    document.getElementById('header-stats').textContent = c + ' nota'+(c!==1?'s':'')+' | '+v+' emb';
  }
  // esc defined above
  function timeAgo(t) { const d=Date.now()-t; return d<60000?'ahora':d<3600000?Math.floor(d/60000)+'m':d<86400000?Math.floor(d/3600000)+'h':Math.floor(d/86400000)+'d'; }

  init();
</script>
</body>
</html>
