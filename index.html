<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid Notepad — Offline AI + Semantic Search</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1a1a1a; --border: #2a2a2a;
    --text: #e0e0e0; --muted: #888; --accent: #3b82f6; --accent2: #8b5cf6;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  .header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); flex-wrap: wrap; }
  .header h1 { font-size: 15px; font-weight: 600; flex-shrink: 0; }
  .model-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .model-badge.loading { background: #1a1a00; color: var(--yellow); }
  .model-badge.ready { background: #0a1a0a; color: var(--green); }
  .model-badge.error { background: #1a0a0a; color: var(--red); }
  .header-stats { margin-left: auto; font-size: 11px; color: var(--muted); }
  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; width: 120px; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

  .app { flex: 1; display: flex; overflow: hidden; }
  .panel { display: flex; flex-direction: column; }
  .panel-left { width: 350px; border-right: 1px solid var(--border); }
  .panel-right { flex: 1; display: flex; flex-direction: column; }

  .search-bar { padding: 10px; border-bottom: 1px solid var(--border); }
  .search-input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-modes { display: flex; gap: 4px; margin-top: 6px; }
  .mode-btn { padding: 3px 8px; font-size: 10px; border: 1px solid var(--border); border-radius: 12px; background: transparent; color: var(--muted); cursor: pointer; }
  .mode-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .folder-chip { padding: 3px 8px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 10px; white-space: nowrap; }
  .folder-chip:hover { border-color: var(--muted); color: var(--text); }
  .folder-chip.active { background: var(--accent); border-color: var(--accent); color: white; }
  .note-item .folder-label { font-size: 9px; color: var(--accent); background: var(--accent)15; padding: 1px 5px; border-radius: 6px; }
  .note-list { flex: 1; overflow-y: auto; }
  .note-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .note-item:hover { background: var(--surface2); }
  .note-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .note-item .title { font-size: 13px; font-weight: 500; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item .preview { font-size: 11px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .note-item .meta { font-size: 10px; color: var(--muted); margin-top: 3px; display: flex; justify-content: space-between; }
  .note-item .score { font-size: 9px; background: var(--accent); color: white; padding: 1px 5px; border-radius: 8px; }
  .note-item .score.bm25 { background: var(--accent2); }
  .note-item .score.hybrid { background: var(--green); color: #000; }
  .note-item .score.graph { background: var(--orange); color: #000; }
  .note-item .tags { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
  .note-item .tag { font-size: 9px; background: var(--surface2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 8px; color: var(--muted); }

  .editor-area { flex: 1; display: flex; flex-direction: column; }
  .editor-toolbar { padding: 6px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
  .editor-title { flex: 1; padding: 5px 8px; background: transparent; border: 1px solid transparent; border-radius: 4px; color: var(--text); font-size: 14px; font-weight: 600; }
  .editor-title:focus { outline: none; border-color: var(--border); background: var(--bg); }
  .editor-content { flex: 1; display: flex; }
  .editor-content textarea { flex: 1; padding: 14px 18px; background: transparent; border: none; color: var(--text); font-size: 13px; line-height: 1.6; resize: none; font-family: inherit; }
  .editor-content textarea:focus { outline: none; }
  .md-preview { flex: 1; padding: 14px 18px; overflow-y: auto; font-size: 13px; line-height: 1.7; display: none; }
  .md-preview h1 { font-size: 1.6em; font-weight: 700; margin: 0.6em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
  .md-preview h2 { font-size: 1.35em; font-weight: 600; margin: 0.5em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
  .md-preview h3 { font-size: 1.15em; font-weight: 600; margin: 0.5em 0 0.2em; }
  .md-preview h4 { font-size: 1em; font-weight: 600; margin: 0.4em 0 0.2em; }
  .md-preview p { margin: 0.4em 0; }
  .md-preview ul, .md-preview ol { margin: 0.4em 0; padding-left: 1.5em; }
  .md-preview li { margin: 0.15em 0; }
  .md-preview code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.9em; }
  .md-preview pre { background: var(--surface2); padding: 10px 14px; border-radius: 6px; overflow-x: auto; margin: 0.5em 0; }
  .md-preview pre code { background: none; padding: 0; }
  .md-preview blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 0.5em 0; color: var(--muted); }
  .md-preview a { color: var(--accent); text-decoration: none; }
  .md-preview a:hover { text-decoration: underline; }
  .md-preview strong { font-weight: 600; }
  .md-preview em { font-style: italic; }
  .md-preview hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
  .md-preview img { max-width: 100%; border-radius: 6px; }
  .md-preview table { border-collapse: collapse; width: 100%; margin: 0.5em 0; }
  .md-preview th, .md-preview td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 12px; }
  .md-preview th { background: var(--surface2); font-weight: 600; }
  .md-preview .task-done { text-decoration: line-through; color: var(--muted); }
  .md-preview .task-check { margin-right: 6px; }
  .editor-footer { padding: 6px 14px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; }

  /* AI Panel */
  .ai-panel { width: 320px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
  .ai-panel.hidden { display: none; }
  .ai-header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .ai-header h3 { font-size: 12px; color: var(--orange); }
  .ai-actions { padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 4px; border-bottom: 1px solid var(--border); }
  .ai-btn { padding: 4px 10px; font-size: 11px; border: 1px solid var(--border); border-radius: 14px; background: transparent; color: var(--text); cursor: pointer; }
  .ai-btn:hover { border-color: var(--orange); color: var(--orange); }
  .ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ai-output { flex: 1; overflow-y: auto; padding: 12px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
  .ai-output .generating { color: var(--orange); }
  .ai-input { padding: 8px; border-top: 1px solid var(--border); }
  .ai-input input { width: 100%; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; }
  .ai-input input:focus { outline: none; border-color: var(--orange); }

  .btn { padding: 5px 10px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; }
  .btn:hover { opacity: 0.9; }
  .btn-sm { padding: 3px 7px; font-size: 10px; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--muted); color: var(--text); }
  .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: white; }
  .btn-ai { background: var(--orange); }
  .empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }

  /* Mobile: view-based navigation */
  @media (max-width: 768px) {
    body { height: 100vh; height: 100dvh; overflow: hidden; }
    .header { padding: 8px 12px; gap: 6px; }
    .header h1 { font-size: 13px; }
    .progress-bar { width: 60px; }
    .header-stats { font-size: 9px; }

    .app { position: relative; }
    .panel-left, .panel-right { position: absolute; inset: 0; width: 100%; border: none; background: var(--bg); transition: transform 0.25s ease; }

    /* View states controlled by .mobile-view-* on .app */
    .panel-left { z-index: 2; transform: translateX(0); }
    .panel-right { z-index: 1; transform: translateX(100%); }
    .app.mobile-view-editor .panel-left { transform: translateX(-100%); }
    .app.mobile-view-editor .panel-right { transform: translateX(0); }

    .search-input { font-size: 16px; padding: 10px 12px; } /* prevents iOS zoom */
    .mode-btn { padding: 5px 10px; font-size: 11px; }
    .note-item { padding: 12px 14px; }
    .note-item .title { font-size: 14px; }
    .note-item .preview { font-size: 12px; }

    .editor-toolbar { padding: 8px 12px; }
    .editor-title { font-size: 16px; } /* prevents iOS zoom */
    .editor-content textarea { font-size: 16px; padding: 12px; } /* prevents iOS zoom */
    .editor-footer { padding: 8px 12px; }

    /* Back button visible on mobile */
    .mobile-back { display: inline-flex !important; }

    /* AI panel: full-screen overlay on mobile */
    .ai-panel { position: fixed; inset: 0; width: 100%; z-index: 10; border: none; max-height: none; }
    .ai-panel.hidden { display: none; }
    .ai-output { font-size: 13px; }
    .ai-input input { font-size: 16px; padding: 10px 12px; }
    .ai-btn { padding: 6px 12px; font-size: 12px; }
  }

  @media (min-width: 769px) {
    .mobile-back { display: none !important; }
  }

  .mobile-back {
    background: none; border: none; color: var(--accent); font-size: 14px;
    cursor: pointer; padding: 4px 8px; display: none;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Hybrid Notepad</h1>
  <div class="model-badge loading" id="embed-status">Embeddings...</div>
  <div class="progress-bar" id="embed-progress"><div class="progress-fill" id="embed-fill" style="width:0%"></div></div>
  <div class="model-badge loading" id="llm-status">LLM...</div>
  <div class="progress-bar" id="llm-progress"><div class="progress-fill" id="llm-fill" style="width:0%"></div></div>
  <div class="header-stats" id="header-stats">0 notas</div>
</div>

<div class="app">
  <div class="panel panel-left">
    <div class="search-bar">
      <input type="text" class="search-input" id="search-input" placeholder="Buscar notas..." oninput="onSearch()" />
      <div class="search-modes">
        <button class="mode-btn active" data-mode="hybrid" onclick="setMode('hybrid')">Hibrida</button>
        <button class="mode-btn" data-mode="semantic" onclick="setMode('semantic')">Semantica</button>
        <button class="mode-btn" data-mode="text" onclick="setMode('text')">BM25</button>
        <button class="mode-btn" data-mode="graph" onclick="setMode('graph')">Graph</button>
      </div>
    </div>
    <div style="padding:6px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="newNote()">+ Nueva</button>
      <button class="btn btn-sm btn-outline" onclick="newFolder()">+ Carpeta</button>
      <button class="btn btn-sm btn-outline" onclick="document.getElementById('pdf-file').click()">PDF</button>
      <button class="btn btn-sm btn-outline" onclick="exportData()">Exp</button>
      <button class="btn btn-sm btn-outline" onclick="document.getElementById('import-file').click()">Imp</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)" />
      <input type="file" id="pdf-file" accept=".pdf,.txt,.md" style="display:none" onchange="importFile(event)" multiple />
    </div>
    <div id="folder-bar" style="padding:4px 10px;border-bottom:1px solid var(--border);display:flex;gap:4px;align-items:center;overflow-x:auto;font-size:11px"></div>
    <div class="note-list" id="note-list" ondrop="dropFiles(event)" ondragover="event.preventDefault();this.style.background='var(--surface2)'" ondragleave="this.style.background=''"><div class="empty">Crea tu primera nota<br><small style="color:var(--muted)">o arrastra PDF/TXT aqui</small></div></div>
  </div>

  <div class="panel panel-right">
    <div class="editor-area" id="editor-area" style="display:none">
      <div class="editor-toolbar">
        <button class="mobile-back" onclick="mobileBack()">&#8592;</button>
        <input type="text" class="editor-title" id="editor-title" placeholder="Titulo..." oninput="onTitleChange()" />
        <select id="editor-folder" onchange="onFolderChange()" style="padding:3px 6px;font-size:10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--muted);max-width:100px"></select>
        <button class="btn btn-sm btn-outline" id="preview-btn" onclick="togglePreview()">Vista</button>
        <button class="btn btn-sm btn-ai" onclick="toggleAI()">AI</button>
        <button class="btn btn-sm btn-outline btn-danger" onclick="deleteNote()">Eliminar</button>
      </div>
      <div style="flex:1;display:flex;overflow:hidden">
        <div class="editor-content">
          <textarea id="editor-text" placeholder="Escribe en Markdown..." oninput="onTextChange()"></textarea>
          <div class="md-preview" id="md-preview"></div>
        </div>
        <div class="ai-panel hidden" id="ai-panel">
          <div class="ai-header">
            <div style="display:flex;align-items:center;gap:6px">
              <button class="mobile-back" onclick="toggleAI()">&#8592;</button>
              <h3>Qwen3 0.6B (local)</h3>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <label style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer" title="Thinking mode">
                <input type="checkbox" id="ai-thinking" onchange="toggleThinking()" style="accent-color:var(--orange)" />
                <span>Think</span>
              </label>
              <button class="btn btn-sm btn-outline" onclick="toggleAI()">X</button>
            </div>
          </div>
          <div class="ai-actions">
            <button class="ai-btn" onclick="aiAction('summarize')" id="ai-summarize">Resumir</button>
            <button class="ai-btn" onclick="aiAction('tags')" id="ai-tags">Auto-tag</button>
            <button class="ai-btn" onclick="aiAction('questions')" id="ai-questions">Preguntas clave</button>
            <button class="ai-btn" onclick="aiAction('expand')" id="ai-expand">Expandir</button>
            <button class="ai-btn" onclick="aiAction('translate')" id="ai-translate">Traducir EN</button>
            <button class="ai-btn" onclick="aiAction('extract')" id="ai-extract">Extraer grafo</button>
            <button class="ai-btn" onclick="showGraph()" id="ai-graph">Ver grafo</button>
          </div>
          <div class="ai-output" id="ai-output"><span style="color:var(--muted)">Selecciona una accion o escribe una pregunta sobre la nota.</span></div>
          <div class="ai-input">
            <input type="text" id="ai-question" placeholder="Pregunta sobre esta nota..." onkeydown="if(event.key==='Enter')aiAsk()" />
          </div>
        </div>
      </div>
      <div class="editor-footer">
        <span id="editor-footer-left"></span>
        <span id="editor-footer-right"></span>
      </div>
    </div>
    <div class="empty" id="editor-empty">Selecciona o crea una nota</div>
  </div>
</div>

<script src="js-vector-store.js"></script>
<script src="js-doc-store.js"></script>

<script>
  // Register Service Worker for model caching
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>

<script type="module">
  import { pipeline, TextStreamer } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';
  import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4/+esm';

  let embedder = null, generator = null;
  let db, notes, vecStore, bm25, hybrid;
  let graphNodes, graphEdges; // Knowledge Graph
  let currentNoteId = null, currentFolder = null, searchMode = 'hybrid', saveTimer = null;
  let aiGenerating = false;
  let thinkingEnabled = false;
  const DIM = 384;

  // ── IndexedDB Adapter ─────────────────────────────────

  class IDBAdapter {
    constructor(dbName = 'hybrid-notepad') { this.dbName = dbName; this._cache = new Map(); this._db = null; }
    async init() {
      this._db = await new Promise((res, rej) => {
        const r = indexedDB.open(this.dbName, 1);
        r.onupgradeneeded = () => r.result.createObjectStore('data');
        r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
      });
      // Load all data in a single transaction (fixes N+1 query issue)
      const tx = this._db.transaction('data', 'readonly');
      const st = tx.objectStore('data');
      const [keys, values] = await Promise.all([
        new Promise(r => { const q = st.getAllKeys(); q.onsuccess = () => r(q.result); }),
        new Promise(r => { const q = st.getAll(); q.onsuccess = () => r(q.result); }),
      ]);
      for (let i = 0; i < keys.length; i++) this._cache.set(keys[i], values[i]);
    }
    readJson(k) { return this._cache.get('json:'+k) ?? null; }
    writeJson(k,v) { this._cache.set('json:'+k, v); }
    readBin(k) { return this._cache.get('bin:'+k) ?? null; }
    writeBin(k,v) { this._cache.set('bin:'+k, v); }
    delete(k) { this._cache.delete('json:'+k); this._cache.delete('bin:'+k); }
    async persist() {
      const tx = this._db.transaction('data','readwrite');
      const st = tx.objectStore('data');
      for (const [k,v] of this._cache) st.put(v, k);
      await new Promise((r,j) => { tx.oncomplete=r; tx.onerror=j; });
    }
  }

  // ── Init ──────────────────────────────────────────────

  const adapter = new IDBAdapter();

  async function init() {
    await adapter.init();
    db = new DocStore(adapter);
    notes = db.collection('notes');
    graphNodes = db.collection('graph_nodes');
    graphEdges = db.collection('graph_edges');
    vecStore = new PolarQuantizedStore(adapter, DIM);
    bm25 = new BM25Index();
    hybrid = new HybridSearch(vecStore, bm25, 'rrf');
    bm25.load(adapter, 'notes');
    if (bm25.count('notes') === 0) {
      for (const n of notes.find({}).toArray()) bm25.addDocument('notes', n._id, (n.title||'')+' '+(n.content||''));
    }
    // Create graph indexes
    try { graphNodes.createIndex('name'); } catch {}
    try { graphNodes.createIndex('type'); } catch {}
    try { graphEdges.createIndex('from'); } catch {}
    try { graphEdges.createIndex('to'); } catch {}
    try { graphEdges.createIndex('noteId'); } catch {}
    renderNoteList(); updateStats();

    // Load models in parallel
    loadEmbedder();
    loadLLM();
  }

  async function loadEmbedder() {
    const t0 = performance.now();
    setStatus('embed', 'loading', 'Cargando E5...');

    try {
      embedder = await pipeline('feature-extraction', 'Xenova/multilingual-e5-small', {
        progress_callback: p => {
          if (p.status === 'progress' && p.total) {
            const pct = Math.round(p.loaded / p.total * 100);
            document.getElementById('embed-fill').style.width = pct + '%';
            setStatus('embed', 'loading', `E5 ${pct}%`);
          }
        }
      });
      const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
      const fromCache = parseFloat(elapsed) < 10; // cache loads in <10s, downloads take 30s+
      setStatus('embed', 'ready', `E5 ${fromCache ? '(cache)' : 'ok'} ${elapsed}s`);
      document.getElementById('embed-progress').style.display = 'none';
      await indexMissingNotes();
    } catch (e) { setStatus('embed', 'error', 'E5 error'); console.error(e); }
  }

  async function loadLLM() {
    const t0 = performance.now();
    const device = navigator.gpu ? 'webgpu' : 'wasm';
    const dtype = device === 'webgpu' ? 'q4f16' : 'q4';
    setStatus('llm', 'loading', 'Cargando Qwen3...');

    try {
      generator = await pipeline('text-generation', 'onnx-community/Qwen3-0.6B-ONNX', {
        device, dtype,
        progress_callback: p => {
          if (p.status === 'progress' && p.total) {
            const pct = Math.round(p.loaded / p.total * 100);
            document.getElementById('llm-fill').style.width = pct + '%';
            setStatus('llm', 'loading', `Qwen3 ${pct}%`);
          }
        }
      });
      const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
      const fromCache = parseFloat(elapsed) < 15;
      setStatus('llm', 'ready', `Qwen3 ${fromCache ? '(cache)' : 'ok'} ${elapsed}s ${device}`);
      document.getElementById('llm-progress').style.display = 'none';
    } catch (e) { setStatus('llm', 'error', 'LLM error'); console.error(e); }
  }

  function setStatus(model, state, text) {
    const el = document.getElementById(model+'-status');
    el.className = 'model-badge ' + state;
    el.textContent = text;
  }

  // ── Embedding ─────────────────────────────────────────

  async function embed(text) {
    if (!embedder) return null;
    const out = await embedder('passage: ' + text, { pooling: 'mean', normalize: true });
    return Array.from(out.data);
  }
  async function embedQuery(text) {
    if (!embedder) return null;
    const out = await embedder('query: ' + text, { pooling: 'mean', normalize: true });
    return Array.from(out.data);
  }
  async function indexMissingNotes() {
    let n = 0;
    for (const note of notes.find({}).toArray()) {
      if (!vecStore.has('notes', note._id) && note.content) {
        const vec = await embed((note.title||'')+' '+note.content);
        if (vec) { vecStore.set('notes', note._id, vec, { title: note.title, preview: note.content.slice(0,100) }); n++; }
      }
    }
    if (n > 0) { vecStore.flush(); await adapter.persist(); updateStats(); }
  }

  // ── Knowledge Graph ──────────────────────────────────

  /** Extraer entidades y relaciones de un texto usando Qwen3 */
  async function extractGraph(noteId, text) {
    if (!generator || !text || text.length < 20) return;

    try {
      const result = await generate(
        `Extrae entidades y relaciones del siguiente texto.
Retorna SOLO un JSON con este formato exacto, sin markdown:
{"entities":[{"name":"Nombre","type":"person|org|project|place|concept|tech"}],"relations":[{"from":"Entidad1","to":"Entidad2","rel":"descripcion corta"}]}

Si no hay entidades claras, retorna {"entities":[],"relations":[]}

Texto: ${text.slice(0, 500)}`,
        { system: 'Eres un extractor de entidades. Responde SOLO JSON valido.', maxTokens: 300 }
      );

      let cleaned = result.trim();
      if (cleaned.includes('```')) cleaned = cleaned.replace(/```json?\n?/g, '').replace(/```/g, '').trim();
      // Find JSON in response
      const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
      if (!jsonMatch) return;

      const data = JSON.parse(jsonMatch[0]);
      if (!data.entities || !Array.isArray(data.entities)) return;

      // Remove old graph data for this note
      const oldEdges = graphEdges.find({ noteId }).toArray();
      for (const e of oldEdges) graphEdges.removeById(e._id);

      // Upsert entities
      for (const ent of data.entities) {
        if (!ent.name || ent.name.length < 2) continue;
        const name = ent.name.trim().toLowerCase();
        const existing = graphNodes.findOne({ name });
        if (!existing) {
          graphNodes.insert({ name, type: ent.type || 'concept', label: ent.name.trim(), noteIds: [noteId], createdAt: Date.now() });
        } else if (!existing.noteIds?.includes(noteId)) {
          graphNodes.update({ _id: existing._id }, { $push: { noteIds: noteId } });
        }
      }

      // Insert relations
      for (const rel of (data.relations || [])) {
        if (!rel.from || !rel.to || !rel.rel) continue;
        graphEdges.insert({
          from: rel.from.trim().toLowerCase(),
          to: rel.to.trim().toLowerCase(),
          rel: rel.rel,
          noteId,
          createdAt: Date.now(),
        });
      }

      db.flush();
      await adapter.persist();
    } catch { /* extraction failed, not critical */ }
  }

  /** BFS traversal del grafo desde un set de entidades iniciales */
  function traverseGraph(startEntities, maxDepth = 2) {
    const visited = new Set();
    const context = []; // { entity, relation, depth }
    let frontier = startEntities.map(e => ({ name: e.toLowerCase(), depth: 0 }));

    while (frontier.length > 0) {
      const next = [];
      for (const { name, depth } of frontier) {
        if (visited.has(name) || depth > maxDepth) continue;
        visited.add(name);

        const node = graphNodes.findOne({ name });
        if (node) context.push({ entity: node.label || name, type: node.type, depth });

        // Find edges from this entity
        const outEdges = graphEdges.find({ from: name }).toArray();
        const inEdges = graphEdges.find({ to: name }).toArray();

        for (const e of outEdges) {
          context.push({ from: name, to: e.to, rel: e.rel, depth });
          if (!visited.has(e.to)) next.push({ name: e.to, depth: depth + 1 });
        }
        for (const e of inEdges) {
          context.push({ from: e.from, to: name, rel: e.rel, depth });
          if (!visited.has(e.from)) next.push({ name: e.from, depth: depth + 1 });
        }
      }
      frontier = next;
    }

    return context;
  }

  /** Busca entidades mencionadas en un query */
  function findEntitiesInQuery(query) {
    const q = query.toLowerCase();
    const allNodes = graphNodes.find({}).toArray();
    return allNodes.filter(n => q.includes(n.name)).map(n => n.name);
  }

  /** Genera contexto de grafo para un query */
  function getGraphContext(query) {
    const entities = findEntitiesInQuery(query);
    if (entities.length === 0) return '';

    const subgraph = traverseGraph(entities, 2);
    if (subgraph.length === 0) return '';

    const lines = [];
    const seen = new Set();
    for (const item of subgraph) {
      if (item.rel) {
        const key = `${item.from}-${item.rel}-${item.to}`;
        if (!seen.has(key)) { lines.push(`${item.from} --[${item.rel}]--> ${item.to}`); seen.add(key); }
      }
    }
    return lines.length > 0 ? 'Relaciones conocidas:\n' + lines.join('\n') : '';
  }

  // ── LLM (Qwen3 local) ────────────────────────────────

  async function generate(prompt, opts = {}) {
    if (!generator) throw new Error('LLM no cargado');
    const messages = [
      { role: 'system', content: opts.system || 'Eres un asistente util. Responde de forma concisa.' },
      { role: 'user', content: prompt + '\n/no_think' },
    ];
    const output = await generator(messages, {
      max_new_tokens: opts.maxTokens || 256,
      do_sample: false,
      temperature: 0.7,
    });
    let result = output[0].generated_text.at(-1).content;
    // Strip any think blocks that leaked through
    result = result.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
    return result;
  }

  window.toggleThinking = function() {
    thinkingEnabled = document.getElementById('ai-thinking').checked;
  };

  async function generateStream(prompt, outputEl, opts = {}) {
    if (!generator) { outputEl.textContent = 'LLM no cargado. Esperando descarga...'; return; }
    aiGenerating = true;
    outputEl.innerHTML = '<span class="generating">Generando...</span>';

    const systemPrompt = opts.system || 'Eres un asistente util. Responde de forma concisa en el idioma del texto.';
    const messages = [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: thinkingEnabled ? prompt : prompt + '\n/no_think' },
    ];

    let rawText = '';
    let inThinkBlock = false;
    let thinkContent = '';
    let answerContent = '';

    const streamer = new TextStreamer(generator.tokenizer, {
      skip_prompt: true,
      skip_special_tokens: true,
      callback_function: (token) => {
        rawText += token;

        // Parse think blocks
        if (rawText.includes('<think>') && !rawText.includes('</think>')) {
          inThinkBlock = true;
          thinkContent = rawText.split('<think>').pop();
          if (thinkingEnabled) {
            outputEl.innerHTML = '<div style="color:var(--muted);font-style:italic;border-left:2px solid var(--orange);padding-left:8px;margin-bottom:8px">Pensando...\n' + esc(thinkContent) + '</div>';
          } else {
            outputEl.innerHTML = '<span class="generating">Pensando...</span>';
          }
        } else if (rawText.includes('</think>')) {
          inThinkBlock = false;
          const parts = rawText.split('</think>');
          thinkContent = (parts[0] || '').replace('<think>', '').trim();
          answerContent = (parts[1] || '').trim();

          let html = '';
          if (thinkingEnabled && thinkContent) {
            html += '<details style="margin-bottom:8px"><summary style="font-size:11px;color:var(--orange);cursor:pointer">Razonamiento</summary><div style="color:var(--muted);font-style:italic;font-size:11px;padding:6px 0;white-space:pre-wrap">' + esc(thinkContent) + '</div></details>';
          }
          html += esc(answerContent);
          outputEl.innerHTML = html;
        } else if (!rawText.includes('<think>')) {
          // No think block at all
          outputEl.textContent = rawText;
        }
        outputEl.scrollTop = outputEl.scrollHeight;
      },
    });

    try {
      await generator(messages, {
        max_new_tokens: thinkingEnabled ? (opts.maxTokens || 300) + 200 : (opts.maxTokens || 300),
        do_sample: false,
        streamer,
      });
    } catch (e) {
      outputEl.innerHTML += '\n\n<span style="color:var(--red)">[Error: ' + e.message + ']</span>';
    }
    aiGenerating = false;

    // Return clean answer (without think block)
    if (rawText.includes('</think>')) {
      return rawText.split('</think>').pop().trim();
    }
    return rawText.replace(/<think>[\s\S]*<\/think>/g, '').trim();
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ── Markdown ─────────────────────────────────────────

  let previewMode = false;

  /** Vanilla Markdown parser — no dependencies */
  function renderMarkdown(md) {
    if (!md) return '';
    let html = md;

    // Code blocks (``` ... ```)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${esc(code.trim())}</code></pre>`
    );

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Images before links
    html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" />');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Split into lines for block-level parsing
    const lines = html.split('\n');
    const out = [];
    let inList = false, listType = '', inTable = false, tableRows = [];

    function flushTable() {
      if (tableRows.length < 2) { out.push(...tableRows.map(r => `<p>${r}</p>`)); tableRows = []; inTable = false; return; }
      let t = '<table>';
      tableRows.forEach((row, i) => {
        if (i === 1 && /^[\s|:-]+$/.test(row)) return; // separator row
        const tag = i === 0 ? 'th' : 'td';
        const cells = row.split('|').filter(c => c.trim() !== '');
        t += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      });
      t += '</table>';
      out.push(t);
      tableRows = []; inTable = false;
    }

    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];

      // Table detection
      if (line.includes('|') && line.trim().startsWith('|')) {
        if (!inTable) inTable = true;
        tableRows.push(line);
        continue;
      } else if (inTable) { flushTable(); }

      // HR
      if (/^(---|\*\*\*|___)$/.test(line.trim())) { if (inList) { out.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; } out.push('<hr>'); continue; }

      // Headers
      const hMatch = line.match(/^(#{1,6})\s+(.+)/);
      if (hMatch) { if (inList) { out.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; } const lvl = hMatch[1].length; out.push(`<h${lvl}>${inlineFormat(hMatch[2])}</h${lvl}>`); continue; }

      // Blockquote
      if (line.startsWith('> ')) { if (inList) { out.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; } out.push(`<blockquote>${inlineFormat(line.slice(2))}</blockquote>`); continue; }

      // Task list
      const taskMatch = line.match(/^(\s*)[-*]\s+\[([ xX])\]\s+(.*)/);
      if (taskMatch) {
        if (!inList) { listType = 'ul'; out.push('<ul>'); inList = true; }
        const checked = taskMatch[2] !== ' ';
        out.push(`<li><input type="checkbox" class="task-check" disabled ${checked ? 'checked' : ''}><span class="${checked ? 'task-done' : ''}">${inlineFormat(taskMatch[3])}</span></li>`);
        continue;
      }

      // Unordered list
      const ulMatch = line.match(/^(\s*)[-*+]\s+(.*)/);
      if (ulMatch) {
        if (!inList || listType !== 'ul') { if (inList) out.push(listType === 'ul' ? '</ul>' : '</ol>'); listType = 'ul'; out.push('<ul>'); inList = true; }
        out.push(`<li>${inlineFormat(ulMatch[2])}</li>`);
        continue;
      }

      // Ordered list
      const olMatch = line.match(/^(\s*)\d+\.\s+(.*)/);
      if (olMatch) {
        if (!inList || listType !== 'ol') { if (inList) out.push(listType === 'ul' ? '</ul>' : '</ol>'); listType = 'ol'; out.push('<ol>'); inList = true; }
        out.push(`<li>${inlineFormat(olMatch[2])}</li>`);
        continue;
      }

      // Close list if not a list item
      if (inList) { out.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }

      // Empty line = paragraph break
      if (line.trim() === '') { out.push(''); continue; }

      // Regular paragraph
      out.push(`<p>${inlineFormat(line)}</p>`);
    }

    if (inList) out.push(listType === 'ul' ? '</ul>' : '</ol>');
    if (inTable) flushTable();

    return out.join('\n');
  }

  function inlineFormat(text) {
    return text
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/~~(.+?)~~/g, '<del>$1</del>')
      .replace(/==(.+?)==/g, '<mark>$1</mark>');
  }

  // ── AI Actions ────────────────────────────────────────

  window.toggleAI = function() {
    document.getElementById('ai-panel').classList.toggle('hidden');
  };

  window.aiAction = async function(action) {
    if (aiGenerating || !currentNoteId) return;
    const note = notes.findById(currentNoteId);
    if (!note || !note.content) return;
    const output = document.getElementById('ai-output');
    const text = (note.title ? note.title + '\n\n' : '') + note.content;

    const prompts = {
      summarize: { system: 'Resume textos de forma concisa, manteniendo los puntos clave.', prompt: `Resume esta nota:\n\n${text}` },
      tags: { system: 'Genera tags/etiquetas relevantes para clasificar textos. Retorna solo las tags separadas por comas, sin explicacion.', prompt: `Genera 3-5 tags para esta nota:\n\n${text}` },
      questions: { system: 'Genera preguntas clave que el texto responde o deberia responder.', prompt: `Que preguntas clave aborda esta nota?\n\n${text}` },
      expand: { system: 'Expande y desarrolla las ideas del texto con mas detalle.', prompt: `Expande esta nota con mas detalle:\n\n${text}`, maxTokens: 500 },
      translate: { system: 'Translate the following text to English. Only output the translation, no explanations.', prompt: text },
    };

    // Manual graph extraction
    if (action === 'extract') {
      output.innerHTML = '<span class="generating">Extrayendo entidades...</span>';
      await extractGraph(currentNoteId, text);
      const nodeCount = graphNodes.count();
      const edgeCount = graphEdges.count();
      output.textContent = `Grafo actualizado: ${nodeCount} entidades, ${edgeCount} relaciones.`;
      return;
    }

    const cfg = prompts[action];
    const result = await generateStream(cfg.prompt, output, { system: cfg.system, maxTokens: cfg.maxTokens || 300 });

    // Auto-save tags if generated
    if (action === 'tags' && result) {
      const tags = result.split(',').map(t => t.trim().toLowerCase()).filter(t => t.length > 1 && t.length < 30);
      if (tags.length > 0) {
        notes.update({ _id: currentNoteId }, { $set: { tags } });
        db.flush(); await adapter.persist();
        renderNoteList();
      }
    }
  };

  window.aiAsk = async function() {
    if (aiGenerating || !currentNoteId) return;
    const input = document.getElementById('ai-question');
    const question = input.value.trim();
    if (!question) return;
    input.value = '';

    const note = notes.findById(currentNoteId);
    if (!note) return;

    const output = document.getElementById('ai-output');
    const text = (note.title ? note.title + '\n\n' : '') + note.content;

    // RAG: buscar notas relacionadas para contexto adicional
    let ragContext = '';
    if (embedder && vecStore.count('notes') > 0) {
      const qVec = await embedQuery(question);
      if (qVec) {
        const related = vecStore.search('notes', qVec, 3).filter(r => r.id !== currentNoteId);
        if (related.length > 0) {
          ragContext = '\n\nNotas relacionadas:\n' + related.map(r => '- ' + (r.metadata.title || '') + ': ' + (r.metadata.preview || '')).join('\n');
        }
      }
    }

    // Graph RAG: traverse knowledge graph for connected context
    let graphContext = getGraphContext(question);
    if (graphContext) graphContext = '\n\n' + graphContext;

    await generateStream(
      `Contexto (nota actual):\n${text}${ragContext}${graphContext}\n\nPregunta: ${question}`,
      output,
      { system: 'Responde preguntas usando el contexto proporcionado, incluyendo relaciones del grafo de conocimiento. Se preciso y conciso.' }
    );
  };

  // ── Graph visualization ─────────────────────────────

  window.showGraph = function() {
    const output = document.getElementById('ai-output');
    const allNodes = graphNodes.find({}).toArray();
    const allEdges = graphEdges.find({}).toArray();

    if (allNodes.length === 0) {
      output.textContent = 'Grafo vacio. Escribe notas y usa "Extraer grafo" para poblar el knowledge graph.';
      return;
    }

    // If viewing a specific note, show its subgraph
    let relevantEdges = allEdges;
    let relevantNodes = allNodes;
    if (currentNoteId) {
      relevantEdges = allEdges.filter(e => e.noteId === currentNoteId);
      const entityNames = new Set();
      relevantEdges.forEach(e => { entityNames.add(e.from); entityNames.add(e.to); });
      if (entityNames.size > 0) {
        relevantNodes = allNodes.filter(n => entityNames.has(n.name));
      }
    }

    // Build text representation
    let html = `<div style="margin-bottom:8px;font-size:11px;color:var(--orange)">Knowledge Graph: ${allNodes.length} entidades, ${allEdges.length} relaciones</div>`;

    // Group by type
    const byType = new Map();
    for (const n of relevantNodes) {
      const t = n.type || 'concept';
      if (!byType.has(t)) byType.set(t, []);
      byType.get(t).push(n);
    }

    const typeColors = { person: '#3b82f6', org: '#22c55e', project: '#f97316', place: '#eab308', tech: '#8b5cf6', concept: '#888' };

    for (const [type, nodes] of byType) {
      const color = typeColors[type] || '#888';
      html += `<div style="margin:6px 0 2px;font-size:10px;text-transform:uppercase;color:${color}">${type}</div>`;
      html += nodes.map(n => `<span style="display:inline-block;padding:2px 8px;margin:2px;border-radius:10px;font-size:11px;background:${color}22;border:1px solid ${color}44;color:${color}">${esc(n.label || n.name)}</span>`).join('');
    }

    // Show relations
    if (relevantEdges.length > 0) {
      html += `<div style="margin:10px 0 4px;font-size:10px;text-transform:uppercase;color:var(--muted)">Relaciones</div>`;
      const seen = new Set();
      for (const e of relevantEdges) {
        const key = `${e.from}|${e.rel}|${e.to}`;
        if (seen.has(key)) continue;
        seen.add(key);
        html += `<div style="font-size:11px;padding:2px 0;color:var(--text)">${esc(e.from)} <span style="color:var(--orange)">→ ${esc(e.rel)} →</span> ${esc(e.to)}</div>`;
      }
    }

    output.innerHTML = html;
  };

  // ── Folders ──────────────────────────────────────────

  function getFolders() {
    const all = notes.find({}).toArray();
    const folders = new Set();
    for (const n of all) { if (n.folder) folders.add(n.folder); }
    return Array.from(folders).sort();
  }

  function renderFolderBar() {
    const folders = getFolders();
    const bar = document.getElementById('folder-bar');
    let html = `<button class="folder-chip ${!currentFolder ? 'active' : ''}" onclick="setFolder(null)">Todas</button>`;
    for (const f of folders) {
      html += `<button class="folder-chip ${currentFolder === f ? 'active' : ''}" onclick="setFolder('${esc(f)}')">${esc(f)}</button>`;
    }
    bar.innerHTML = html;
  }

  window.newNote = function() {
    const note = notes.insert({ title: '', content: '', tags: [], folder: currentFolder || null, createdAt: Date.now(), updatedAt: Date.now() });
    db.flush(); adapter.persist();
    selectNote(note._id); renderNoteList();
    document.getElementById('editor-title').focus();

  window.deleteNote = function() {
    if (!currentNoteId || !confirm('Eliminar?')) return;
    // Clean graph data for this note
    const noteEdges = graphEdges.find({ noteId: currentNoteId }).toArray();
    for (const e of noteEdges) graphEdges.removeById(e._id);
    // Remove note from entity noteIds, delete orphan entities
    const allNodes = graphNodes.find({}).toArray();
    for (const node of allNodes) {
      if (node.noteIds && node.noteIds.includes(currentNoteId)) {
        const remaining = node.noteIds.filter(id => id !== currentNoteId);
        if (remaining.length === 0) { graphNodes.removeById(node._id); }
        else { graphNodes.update({ _id: node._id }, { $set: { noteIds: remaining } }); }
      }
    }
    notes.removeById(currentNoteId);
    bm25.removeDocument('notes', currentNoteId);
    vecStore.remove('notes', currentNoteId);
    db.flush(); bm25.save(adapter, 'notes'); vecStore.flush(); adapter.persist();
    currentNoteId = null;
    document.getElementById('editor-area').style.display = 'none';
    document.getElementById('editor-empty').style.display = 'flex';
    document.querySelector('.app').classList.remove('mobile-view-editor');
    renderNoteList(); updateStats();
  };

  function selectNote(id) {
    currentNoteId = id;
    const note = notes.findById(id);

    document.getElementById('editor-title').value = note.title || '';

    document.querySelector('.app').classList.add('mobile-view-editor');
    renderNoteList();
  }

  window.onTitleChange = function() { scheduleSave(); };
  window.onTextChange = function() { scheduleSave(); };

  function scheduleSave() { if (saveTimer) clearTimeout(saveTimer); saveTimer = setTimeout(() => saveCurrentNote(), 600); }

  async function saveCurrentNote() {
    if (!currentNoteId) return;
    const title = document.getElementById('editor-title').value;
    const content = document.getElementById('editor-text').value;
    notes.update({ _id: currentNoteId }, { $set: { title, content, updatedAt: Date.now() } });
    db.flush();
    bm25.removeDocument('notes', currentNoteId);
    bm25.addDocument('notes', currentNoteId, (title||'')+' '+content);
    bm25.save(adapter, 'notes');
    if (embedder && content.length > 0) {
      const vec = await embed((title||'')+' '+content);
      if (vec) { vecStore.set('notes', currentNoteId, vec, { title, preview: content.slice(0,100) }); vecStore.flush(); }
    }
    await adapter.persist();

    // Extract graph entities (throttled: only if content changed significantly)
    if (generator && content.length > 50 && !aiGenerating) {
      const key = '_lastExtract_' + currentNoteId;
      const lastLen = window[key] || 0;
      // Only re-extract if content grew by 30+ chars (avoids re-extracting on every keystroke)
      if (Math.abs(content.length - lastLen) > 30) {
        window[key] = content.length;
        extractGraph(currentNoteId, (title||'') + ' ' + content).catch(() => {});
      }
    }
    const words = content.split(/\s+/).filter(Boolean).length;
    document.getElementById('editor-footer-left').textContent = 'Guardada: ' + new Date().toLocaleTimeString();
    document.getElementById('editor-footer-right').textContent = words + ' palabras';
    renderNoteList(); updateStats();
  }

  // ── Search ────────────────────────────────────────────

  let searchTimer = null;
  window.onSearch = function() { if (searchTimer) clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 200); };

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) { renderNoteList(); return; }
    const results = [];
    if (searchMode === 'graph') {
      // Graph search: find entities matching query, traverse, find notes
      const entities = findEntitiesInQuery(q);
      if (entities.length > 0) {
        const subgraph = traverseGraph(entities, 2);
        const noteIds = new Set();
        // Get notes from entities
        for (const item of subgraph) {
          const names = [
            item.entity ? item.entity.toLowerCase() : null,
            item.from || null,
            item.to || null,
          ].filter(Boolean);
          for (const name of names) {
            const node = graphNodes.findOne({ name });
            if (node?.noteIds) node.noteIds.forEach(id => noteIds.add(id));
          }
        }
        for (const id of noteIds) {
          const n = notes.findById(id);
          if (n) results.push({...n, score: 1, scoreType: 'graph'});
        }
      }
      // Fallback to BM25 if no graph results
      if (results.length === 0) {
        for (const r of bm25.search('notes', q, 20)) { const n = notes.findById(r.id); if (n) results.push({...n, score: r.score, scoreType: 'bm25'}); }
      }
    } else if (searchMode === 'text' || !embedder) {
      for (const r of bm25.search('notes', q, 20)) { const n = notes.findById(r.id); if (n) results.push({...n, score: r.score, scoreType: 'bm25'}); }
    } else if (searchMode === 'semantic') {
      const qv = await embedQuery(q);
      if (qv && vecStore.count('notes') > 0) for (const r of vecStore.search('notes', qv, 20)) { const n = notes.findById(r.id); if (n) results.push({...n, score: r.score, scoreType: 'semantic'}); }
    } else {
      if (vecStore.count('notes') > 0 && embedder) {
        const qv = await embedQuery(q);
        if (qv) for (const r of hybrid.search('notes', qv, q, 20)) { const n = notes.findById(r.id); if (n) results.push({...n, score: r.score, scoreType: 'hybrid'}); }
      } else {
        for (const r of bm25.search('notes', q, 20)) { const n = notes.findById(r.id); if (n) results.push({...n, score: r.score, scoreType: 'bm25'}); }
      }
    }
    renderSearchResults(results);
  }

  window.setMode = function(m) {
    searchMode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    if (document.getElementById('search-input').value.trim()) doSearch();
  };

  // ── Render ────────────────────────────────────────────

  function renderNoteList() {
    const list = document.getElementById('note-list');
    let all = notes.find({}).sort({ updatedAt: -1 }).toArray();
    // Filter by current folder
    if (currentFolder) all = all.filter(n => n.folder === currentFolder);
    renderFolderBar();
    if (all.length === 0) { list.innerHTML = '<div class="empty">' + (currentFolder ? 'Carpeta vacia' : 'Crea tu primera nota<br><small style="color:var(--muted)">o arrastra PDF/TXT aqui</small>') + '</div>'; return; }
    list.innerHTML = all.map(n => `
      <div class="note-item ${n._id===currentNoteId?'active':''}" onclick="selectNote('${n._id}')">
        <div class="title">${esc(n.title||'Sin titulo')}${!currentFolder && n.folder ? ' <span class="folder-label">'+esc(n.folder)+'</span>' : ''}</div>
        <div class="preview">${esc((n.content||'').slice(0,100))}</div>
        ${n.tags&&n.tags.length ? '<div class="tags">'+n.tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>' : ''}
        <div class="meta"><span>${timeAgo(n.updatedAt)}</span></div>
      </div>`).join('');
  }

  function renderSearchResults(results) {
    const list = document.getElementById('note-list');
    if (!results.length) { list.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
    list.innerHTML = results.map(n => `
      <div class="note-item ${n._id===currentNoteId?'active':''}" onclick="selectNote('${n._id}')">
        <div class="title">${esc(n.title||'Sin titulo')} <span class="score ${n.scoreType}">${n.score.toFixed(4)}</span></div>
        <div class="preview">${esc((n.content||'').slice(0,100))}</div>
        <div class="meta"><span>${timeAgo(n.updatedAt)}</span><span>${n.scoreType}</span></div>
      </div>`).join('');
  }

  function updateStats() {
    const c = notes.count(), v = vecStore.count('notes');
    const gn = graphNodes.count(), ge = graphEdges.count();
    let stats = c + ' nota'+(c!==1?'s':'')+' | '+v+' emb';
    if (gn > 0) stats += ' | '+gn+' nodos '+ge+' edges';
    document.getElementById('header-stats').textContent = stats;
  }
  // esc defined above
  function timeAgo(t) { const d=Date.now()-t; return d<60000?'ahora':d<3600000?Math.floor(d/60000)+'m':d<86400000?Math.floor(d/3600000)+'h':Math.floor(d/86400000)+'d'; }

  // ── File Import (PDF/TXT/MD) ─────────────────────────

  async function parsePDF(arrayBuffer, filename) {
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const text = content.items.map(item => item.str).join(' ');
      if (text.trim()) pages.push(text.trim());
    }
    return { title: filename.replace(/\.pdf$/i, ''), content: pages.join('\n\n'), pageCount: pdf.numPages };
  }

  async function importSingleFile(file) {
    const name = file.name;
    let title = name.replace(/\.[^.]+$/, '');
    let content = '';

    if (name.endsWith('.pdf')) {
      const buf = await file.arrayBuffer();
      const parsed = await parsePDF(buf, name);
      title = parsed.title;
      content = parsed.content;
      if (!content.trim()) { alert(name + ': PDF sin texto extraible (escaneado). Necesita OCR.'); return null; }
    } else {
      // TXT, MD, or any text file
      content = await file.text();
    }

    // Create note
    const note = notes.insert({ title, content, tags: [], createdAt: Date.now(), updatedAt: Date.now() });
    bm25.addDocument('notes', note._id, title + ' ' + content);

    // Index embedding
    if (embedder && content.length > 0) {
      // For long docs, embed first 1000 chars (model context limit)
      const embedText = (title + ' ' + content).slice(0, 1000);
      const vec = await embed(embedText);
      if (vec) vecStore.set('notes', note._id, vec, { title, preview: content.slice(0, 100) });
    }

    return note;
  }

  window.importFile = async function(event) {
    const files = Array.from(event.target.files);
    if (!files.length) return;

    let imported = 0;
    for (const file of files) {
      try {
        const note = await importSingleFile(file);
        if (note) imported++;
      } catch (e) {
        console.error('Import error:', file.name, e);
      }
    }

    if (imported > 0) {
      db.flush(); bm25.save(adapter, 'notes'); vecStore.flush();
      await adapter.persist();
      renderNoteList(); updateStats();
      // Extract graph for imported notes (async)
      if (generator) {
        const recent = notes.find({}).sort({ createdAt: -1 }).limit(imported).toArray();
        for (const n of recent) {
          extractGraph(n._id, (n.title||'') + ' ' + n.content).catch(() => {});
        }
      }
    }

    alert(imported + ' archivo' + (imported !== 1 ? 's' : '') + ' importado' + (imported !== 1 ? 's' : ''));
    event.target.value = '';
  };

  window.dropFiles = async function(event) {
    event.preventDefault();
    event.currentTarget.style.background = '';
    const files = Array.from(event.dataTransfer.files).filter(f =>
      f.name.endsWith('.pdf') || f.name.endsWith('.txt') || f.name.endsWith('.md')
    );
    if (!files.length) { alert('Solo PDF, TXT, o MD'); return; }

    let imported = 0;
    for (const file of files) {
      try {
        const note = await importSingleFile(file);
        if (note) imported++;
      } catch (e) { console.error('Drop import error:', file.name, e); }
    }

    if (imported > 0) {
      db.flush(); bm25.save(adapter, 'notes'); vecStore.flush();
      await adapter.persist();
      renderNoteList(); updateStats();
    }
    if (imported > 0) alert(imported + ' archivo' + (imported !== 1 ? 's' : '') + ' importado' + (imported !== 1 ? 's' : ''));
  };

  // ── Export/Import ────────────────────────────────────

  window.exportData = function() {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      notes: notes.find({}).toArray(),
      graphNodes: graphNodes.find({}).toArray(),
      graphEdges: graphEdges.find({}).toArray(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `notepad-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  window.importData = async function(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.notes || !Array.isArray(data.notes)) throw new Error('Formato invalido');

      let imported = 0;
      for (const note of data.notes) {
        if (!notes.findById(note._id)) {
          notes.insert(note);
          bm25.addDocument('notes', note._id, (note.title||'')+' '+(note.content||''));
          if (embedder && note.content) {
            const vec = await embed((note.title||'')+' '+note.content);
            if (vec) vecStore.set('notes', note._id, vec, { title: note.title, preview: (note.content||'').slice(0,100) });
          }
          imported++;
        }
      }
      if (data.graphNodes) for (const n of data.graphNodes) { if (!graphNodes.findById(n._id)) try { graphNodes.insert(n); } catch {} }
      if (data.graphEdges) for (const e of data.graphEdges) { if (!graphEdges.findById(e._id)) try { graphEdges.insert(e); } catch {} }

      db.flush(); bm25.save(adapter, 'notes'); vecStore.flush();
      await adapter.persist();
      renderNoteList(); updateStats();
      alert('Importadas ' + imported + ' notas nuevas.');
    } catch (e) {
      alert('Error al importar: ' + e.message);
    }
    event.target.value = '';
  };

  init();
</script>
</body>
</html>
